<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | SmartPlacement</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#0F172A]">
    <div class="min-h-screen flex flex-col md:flex-row">
        <!-- Sidebar Navigation -->
        <aside class="w-full md:w-64 bg-white border-r border-[#E2E8F0] flex flex-col sticky top-0 h-auto md:h-screen z-20">
            <div class="p-6 border-b border-[#E2E8F0] flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">S</div>
                <span class="font-bold text-xl tracking-tight">SmartPlacement</span>
            </div>
            
            <nav class="flex-1 p-4 space-y-2">
                <button class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 bg-indigo-50 text-indigo-600 font-semibold" data-tab="Your Dashboard">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span>Your Dashboard</span>
                </button>
                <button class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-[#64748B] hover:bg-[#F1F5F9] hover:text-[#0F172A]" data-tab="Job Postings">
                    <i data-lucide="briefcase" class="w-5 h-5"></i>
                    <span>Job Postings</span>
                </button>
                <button class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-[#64748B] hover:bg-[#F1F5F9] hover:text-[#0F172A]" data-tab="Applied Jobs">
                    <i data-lucide="clipboard-check" class="w-5 h-5"></i>
                    <span>Applied Jobs</span>
                </button>
                <button class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-[#64748B] hover:bg-[#F1F5F9] hover:text-[#0F172A]" data-tab="Schedule">
                    <i data-lucide="calendar" class="w-5 h-5"></i>
                    <span>Schedule</span>
                </button>
            </nav>

            <div class="p-4 border-t border-[#E2E8F0]">
                <button onclick="signOut()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-red-600 hover:bg-red-50 font-semibold mb-4">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    <span>Sign Out</span>
                </button>
                <div class="bg-[#F1F5F9] rounded-2xl p-4">
                    <p class="text-xs font-bold text-[#94A3B8] uppercase tracking-wider mb-2">Placement Status</p>
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-semibold">Active Applications</span>
                        <span class="bg-indigo-600 text-white text-xs font-bold px-2 py-1 rounded-full">12</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
            <!-- Header -->
            <header class="bg-white border-b border-[#E2E8F0] px-8 py-4 flex flex-col sm:flex-row items-center justify-between gap-4 sticky top-0 z-10">
                <div class="flex items-center gap-4">
                    <div class="relative group">
                        <div class="w-12 h-12 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 overflow-hidden border-2 border-white shadow-sm">
                            <i data-lucide="user" class="w-6 h-6"></i>
                        </div>
                        <div class="absolute -bottom-1 -right-1 bg-green-500 w-4 h-4 rounded-full border-2 border-white"></div>
                    </div>
                    
                    <div class="flex flex-col">
                        <div class="flex items-center gap-2">
                            <div id="name-display-container" class="flex items-center gap-2">
                                <h1 id="student-name-heading" class="text-xl font-bold tracking-tight">Student Dashboard (Karthik Komiresh)</h1>
                                <button id="edit-name-btn" class="p-1 text-[#94A3B8] hover:text-indigo-600 transition-colors">
                                    <i data-lucide="edit-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                            <div id="name-edit-container" class="hidden flex items-center gap-2">
                                <input id="name-input" type="text" class="border border-indigo-300 rounded px-2 py-1 text-lg font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                <button id="save-name-btn" class="p-1 text-green-600 hover:bg-green-50 rounded"><i data-lucide="check" class="w-4.5 h-4.5"></i></button>
                                <button id="cancel-name-btn" class="p-1 text-red-600 hover:bg-red-50 rounded"><i data-lucide="x" class="w-4.5 h-4.5"></i></button>
                            </div>
                        </div>
                        <p class="text-sm text-[#64748B]">B.Tech Computer Science • Batch of 2026</p>
                    </div>
                </div>

                <div class="flex items-center gap-3">
                    <div class="relative hidden lg:block">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-[#94A3B8] w-4.5 h-4.5"></i>
                        <input type="text" placeholder="Search jobs, events..." class="bg-[#F1F5F9] border-none rounded-xl pl-10 pr-4 py-2 text-sm w-64 focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>
                    <button class="p-2 text-[#64748B] hover:bg-[#F1F5F9] rounded-xl relative">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                        <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                    </button>
                </div>
            </header>

            <!-- Dashboard Grid -->
            <div id="main-view" class="p-8 space-y-8 overflow-y-auto custom-scrollbar">
                <!-- Top Row: Active Drives & Upcoming Events -->
                <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
                    <!-- Active Placement Drives -->
                    <section class="xl:col-span-2 space-y-4">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                            <h2 class="text-lg font-bold flex items-center gap-2">
                                <i data-lucide="briefcase" class="w-5 h-5 text-indigo-600"></i>
                                Active Placement Drives
                            </h2>
                            <div class="flex items-center gap-2">
                                <select id="drives-filter" class="text-xs font-bold bg-white border border-[#E2E8F0] rounded-lg px-2 py-1 focus:ring-2 focus:ring-indigo-500">
                                    <option value="All">All Dates</option>
                                    <option value="Upcoming">Upcoming</option>
                                    <option value="Past">Past</option>
                                </select>
                                <select id="drives-sort" class="text-xs font-bold bg-white border border-[#E2E8F0] rounded-lg px-2 py-1 focus:ring-2 focus:ring-indigo-500">
                                    <option value="Asc">Date Asc</option>
                                    <option value="Desc">Date Desc</option>
                                </select>
                            </div>
                        </div>
                        
                        <div id="drives-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <!-- Drives will be injected here -->
                        </div>
                    </section>

                    <!-- Upcoming Events -->
                    <section class="space-y-4">
                        <div class="flex flex-col gap-3">
                            <h2 class="text-lg font-bold flex items-center gap-2">
                                <i data-lucide="calendar" class="w-5 h-5 text-indigo-600"></i>
                                Upcoming Events
                            </h2>
                            <div class="flex flex-wrap items-center gap-2">
                                <select id="events-filter-type" class="text-[10px] font-bold bg-white border border-[#E2E8F0] rounded-lg px-2 py-1">
                                    <option value="All">All Types</option>
                                    <option value="Test">Tests</option>
                                    <option value="Interview">Interviews</option>
                                    <option value="Seminar">Seminars</option>
                                    <option value="Meeting">Meetings</option>
                                </select>
                                <select id="events-filter-date" class="text-[10px] font-bold bg-white border border-[#E2E8F0] rounded-lg px-2 py-1">
                                    <option value="All">All Dates</option>
                                    <option value="Upcoming">Upcoming</option>
                                    <option value="Past">Past</option>
                                </select>
                                <select id="events-sort" class="text-[10px] font-bold bg-white border border-[#E2E8F0] rounded-lg px-2 py-1">
                                    <option value="Asc">Asc</option>
                                    <option value="Desc">Desc</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="bg-white rounded-2xl border border-[#E2E8F0] shadow-sm overflow-hidden">
                            <div id="events-container" class="divide-y divide-[#E2E8F0]">
                                <!-- Events will be injected here -->
                            </div>
                            <button class="w-full py-3 text-sm font-bold text-[#64748B] hover:text-indigo-600 bg-[#F8FAFC] border-t border-[#E2E8F0]">
                                View Full Calendar
                            </button>
                        </div>
                    </section>
                </div>

                <!-- Bottom Row: Notice Board -->
                <section class="space-y-4">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <h2 class="text-lg font-bold flex items-center gap-2">
                            <i data-lucide="bell" class="w-5 h-5 text-indigo-600"></i>
                            Notice Board
                        </h2>
                        <div class="flex flex-wrap items-center gap-2">
                            <select id="notices-filter-type" class="text-xs font-bold bg-white border border-[#E2E8F0] rounded-full px-3 py-1">
                                <option value="All">All Categories</option>
                                <option value="Jobs">Jobs</option>
                                <option value="Meetings">Meetings</option>
                                <option value="Tests">Tests</option>
                                <option value="Seminars">Seminars</option>
                            </select>
                            <select id="notices-filter-date" class="text-xs font-bold bg-white border border-[#E2E8F0] rounded-full px-3 py-1">
                                <option value="All">All Dates</option>
                                <option value="Upcoming">Upcoming</option>
                                <option value="Past">Past</option>
                            </select>
                            <select id="notices-sort" class="text-xs font-bold bg-white border border-[#E2E8F0] rounded-full px-3 py-1">
                                <option value="Asc">Date Asc</option>
                                <option value="Desc">Date Desc</option>
                            </select>
                        </div>
                    </div>

                    <div id="notices-container" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <!-- Notices will be injected here -->
                    </div>
                </section>
            </div>

            <!-- Applied Jobs View -->
            <div id="applied-jobs-view" class="hidden p-8 space-y-8 overflow-y-auto custom-scrollbar flex-1">
                <div class="flex items-center gap-3 mb-6">
                    <i data-lucide="clipboard-check" class="w-8 h-8 text-indigo-600"></i>
                    <h2 class="text-2xl font-bold text-[#0F172A]">Your Applied Jobs</h2>
                </div>
                <div id="applied-jobs-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                    <!-- Applied jobs injected here -->
                </div>
            </div>
        </main>
    </div>

    <script src="api_util.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Data
        const now = new Date();
        const userObj = JSON.parse(localStorage.getItem('user') || '{}');
        let studentName = userObj.fullName || "Student";

        let placementDrives = [];
        let upcomingEvents = [];
        let notices = [];

        // DOM Elements
        const drivesContainer = document.getElementById('drives-container');
        const eventsContainer = document.getElementById('events-container');
        const noticesContainer = document.getElementById('notices-container');

        // Name Editing Logic
        const nameHeading = document.getElementById('student-name-heading');
        const editNameBtn = document.getElementById('edit-name-btn');
        const nameDisplayContainer = document.getElementById('name-display-container');
        const nameEditContainer = document.getElementById('name-edit-container');
        const nameInput = document.getElementById('name-input');
        const saveNameBtn = document.getElementById('save-name-btn');
        const cancelNameBtn = document.getElementById('cancel-name-btn');

        editNameBtn.onclick = () => {
            nameInput.value = studentName;
            nameDisplayContainer.classList.add('hidden');
            nameEditContainer.classList.remove('hidden');
            nameInput.focus();
        };

        saveNameBtn.onclick = () => {
            studentName = nameInput.value;
            nameHeading.textContent = `Student Dashboard (${studentName})`;
            nameDisplayContainer.classList.remove('hidden');
            nameEditContainer.classList.add('hidden');
        };

        cancelNameBtn.onclick = () => {
            nameDisplayContainer.classList.remove('hidden');
            nameEditContainer.classList.add('hidden');
        };

        // Render Functions
        function renderDrives() {
            const filter = document.getElementById('drives-filter').value;
            const sort = document.getElementById('drives-sort').value;

            let filtered = placementDrives.filter(d => {
                if (filter === 'Upcoming') return d.deadlineDate >= now;
                if (filter === 'Past') return d.deadlineDate < now;
                return true;
            });

            filtered.sort((a, b) => {
                const diff = a.deadlineDate - b.deadlineDate;
                return sort === 'Asc' ? diff : -diff;
            });

            if(!filtered.length) {
                drivesContainer.innerHTML = '<div class="text-[#64748B] p-4 text-sm mt-4">No jobs available.</div>';
                return;
            }

            drivesContainer.innerHTML = filtered.map(drive => `
                <div class="bg-white p-5 rounded-2xl border border-[#E2E8F0] shadow-sm hover:shadow-md transition-all hover:-translate-y-1">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 bg-[#F8FAFC] rounded-xl flex items-center justify-center font-bold text-indigo-600 border border-[#E2E8F0]">
                                ${drive.logo}
                            </div>
                            <div>
                                <h3 class="font-bold text-[#0F172A]">${drive.company}</h3>
                                <p class="text-xs text-[#64748B] font-medium uppercase tracking-wider">${drive.role}</p>
                            </div>
                        </div>
                        <span class="bg-green-50 text-green-700 text-xs font-bold px-2 py-1 rounded-lg border border-green-100">
                            ${drive.package || 'TBD'}
                        </span>
                    </div>
                    <div class="space-y-2 mb-4">
                        <div class="flex items-center gap-2 text-sm text-[#64748B]">
                            <i data-lucide="map-pin" class="w-3.5 h-3.5"></i>
                            <span>${drive.location}</span>
                        </div>
                        <div class="flex items-center gap-2 text-sm text-[#64748B]">
                            <i data-lucide="clock" class="w-3.5 h-3.5"></i>
                            <span>Deadline: ${drive.deadline}</span>
                        </div>
                    </div>
                    <button class="apply-btn w-full py-2.5 bg-indigo-600 text-white rounded-xl font-bold text-sm hover:bg-indigo-700 transition-colors" data-id="${drive.id}">
                        Apply Now
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
            
            document.querySelectorAll('.apply-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    try {
                        const res = await apiFetch('/student/jobs/' + id + '/apply', { method: 'POST' });
                        if(res.ok) {
                            alert('Application submitted successfully!');
                            loadData();
                        } else {
                            const err = await res.json();
                            alert(err.error || 'Failed to apply');
                        }
                    } catch(err) {
                        alert('Network Error');
                    }
                });
            });
        }

        function renderEvents() {
            const typeFilter = document.getElementById('events-filter-type').value;
            const dateFilter = document.getElementById('events-filter-date').value;
            const sort = document.getElementById('events-sort').value;

            let filtered = upcomingEvents.filter(e => {
                const typeMatch = typeFilter === 'All' || e.type === typeFilter;
                const dateMatch = dateFilter === 'All' || (dateFilter === 'Upcoming' ? e.dateObject >= now : e.dateObject < now);
                return typeMatch && dateMatch;
            });

            filtered.sort((a, b) => {
                const diff = a.dateObject - b.dateObject;
                return sort === 'Asc' ? diff : -diff;
            });

            if (!filtered.length) {
                eventsContainer.innerHTML = '<div class="p-4 text-sm text-[#64748B]">No upcoming events.</div>';
                return;
            }

            eventsContainer.innerHTML = filtered.map(event => `
                <div class="p-4 hover:bg-[#F8FAFC] transition-colors group">
                    <div class="flex items-start gap-4">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 ${
                            event.type === 'Test' ? 'bg-amber-50 text-amber-600' :
                            event.type === 'Interview' ? 'bg-blue-50 text-blue-600' :
                            event.type === 'Seminar' ? 'bg-purple-50 text-purple-600' :
                            'bg-gray-50 text-gray-600'
                        }">
                            <i data-lucide="${
                                event.type === 'Test' ? 'file-text' :
                                event.type === 'Interview' ? 'video' :
                                'users'
                            }" class="w-5 h-5"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-bold text-sm truncate">${event.title}</h4>
                            <div class="flex items-center gap-3 mt-1">
                                <span class="text-xs text-[#64748B] flex items-center gap-1">
                                    <i data-lucide="clock" class="w-3 h-3"></i>
                                    ${event.date}, ${event.time}
                                </span>
                                <span class="text-xs text-[#64748B] flex items-center gap-1">
                                    <i data-lucide="map-pin" class="w-3 h-3"></i>
                                    ${event.location}
                                </span>
                            </div>
                        </div>
                        <button class="p-1 text-[#94A3B8] hover:text-indigo-600 opacity-0 group-hover:opacity-100 transition-all">
                            <i data-lucide="chevron-right" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderNotices() {
            const typeFilter = document.getElementById('notices-filter-type').value;
            const dateFilter = document.getElementById('notices-filter-date').value;
            const sort = document.getElementById('notices-sort').value;

            let filtered = notices.filter(n => {
                const typeMatch = typeFilter === 'All' || n.category === typeFilter;
                const dateMatch = dateFilter === 'All' || (dateFilter === 'Upcoming' ? n.dateObject >= now : n.dateObject < now);
                return typeMatch && dateMatch;
            });

            filtered.sort((a, b) => {
                const diff = a.dateObject - b.dateObject;
                return sort === 'Asc' ? diff : -diff;
            });

            if (!filtered.length) {
                noticesContainer.innerHTML = '<div class="p-4 text-sm text-[#64748B]">No new notices.</div>';
                return;
            }

            noticesContainer.innerHTML = filtered.map(notice => `
                <div class="bg-white p-6 rounded-2xl border border-[#E2E8F0] shadow-sm relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-1 h-full ${
                        notice.priority === 'High' ? 'bg-red-500' :
                        notice.priority === 'Medium' ? 'bg-amber-500' :
                        'bg-blue-500'
                    }"></div>
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-[#94A3B8]">
                            ${notice.category} • ${notice.date}
                        </span>
                        ${notice.priority === 'High' ? '<span class="bg-red-50 text-red-600 text-[10px] font-black px-1.5 py-0.5 rounded uppercase">Urgent</span>' : ''}
                    </div>
                    <h3 class="font-bold text-[#0F172A] mb-2 group-hover:text-indigo-600 transition-colors">${notice.title}</h3>
                    <p class="text-sm text-[#64748B] leading-relaxed">${notice.content}</p>
                    <button class="mt-4 text-xs font-bold text-indigo-600 flex items-center gap-1 hover:gap-2 transition-all">
                        Read More <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Event Listeners for Filters
        document.getElementById('drives-filter').onchange = renderDrives;
        document.getElementById('drives-sort').onchange = renderDrives;
        document.getElementById('events-filter-type').onchange = renderEvents;
        document.getElementById('events-filter-date').onchange = renderEvents;
        document.getElementById('events-sort').onchange = renderEvents;
        document.getElementById('notices-filter-type').onchange = renderNotices;
        document.getElementById('notices-filter-date').onchange = renderNotices;
        document.getElementById('notices-sort').onchange = renderNotices;

        function renderAppliedJobs(apps) {
            const container = document.getElementById('applied-jobs-container');
            if(!apps || !apps.length) {
                container.innerHTML = '<div class="text-[#64748B] p-4 text-sm col-span-full">You have not applied to any jobs yet.</div>';
                return;
            }
            container.innerHTML = apps.map(app => `
                <div class="bg-white p-5 rounded-2xl border border-[#E2E8F0] shadow-sm flex flex-col items-start gap-4">
                    <span class="bg-indigo-50 text-indigo-700 text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-wider border border-indigo-100">${app.status}</span>
                    <div>
                        <h3 class="font-bold text-lg text-[#0F172A]">${app.Job.title}</h3>
                        <p class="text-sm text-[#64748B] font-medium mt-1">${app.Job.Recruiter ? app.Job.Recruiter.company : 'Company'}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(btn => {
            btn.addEventListener('click', () => {
                navItems.forEach(n => {
                    n.classList.remove('bg-indigo-50', 'text-indigo-600', 'font-semibold');
                    n.classList.add('text-[#64748B]');
                });
                btn.classList.add('bg-indigo-50', 'text-indigo-600', 'font-semibold');
                btn.classList.remove('text-[#64748B]');

                const tab = btn.getAttribute('data-tab');
                if (tab === 'Applied Jobs') {
                    document.getElementById('main-view').classList.add('hidden');
                    document.getElementById('applied-jobs-view').classList.remove('hidden');
                } else {
                    document.getElementById('applied-jobs-view').classList.add('hidden');
                    document.getElementById('main-view').classList.remove('hidden');
                }
            });
        });

        function signOut() {
            localStorage.clear();
            window.location.href = 'index1.html';
        }

        async function loadData() {
            nameHeading.textContent = `Student Dashboard (${studentName})`;
            try {
                const [jobsRes, dashRes, appsRes] = await Promise.all([
                    apiFetch('/student/jobs'),
                    apiFetch('/student/dashboard'),
                    apiFetch('/student/applications')
                ]);
                const liveJobs = await jobsRes.json();
                placementDrives = liveJobs.map(j => ({
                    id: j.id,
                    company: j.Recruiter ? j.Recruiter.company : j.company,
                    role: j.title || j.role,
                    package: j.package,
                    deadline: new Date(j.deadline).toLocaleDateString(),
                    deadlineDate: new Date(j.deadline),
                    location: j.location,
                    logo: (j.Recruiter && j.Recruiter.company) ? j.Recruiter.company.substring(0,2).toUpperCase() : 'Co'
                }));
                const dashStats = await dashRes.json();
                const appsData = await appsRes.json();
                document.querySelector('.bg-indigo-600.text-white.px-2.py-1').textContent = dashStats.activeApplications || 0;
                
                renderAppliedJobs(appsData);
            } catch (err) {
                console.error(err);
            }
            renderDrives();
            renderEvents();
            renderNotices();
        }

        // Initial Render
        loadData();
    </script>
</body>
